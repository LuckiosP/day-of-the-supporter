      <stop offset="0%" style="stop-color:#FAF8F5"/>
      <stop offset="100%" style="stop-color:#F0EDE8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <circle cx="100" cy="100" r="140" fill="#8A9A7B" opacity="0.12"/>
  <circle cx="1100" cy="575" r="160" fill="#C17F59" opacity="0.08"/>

